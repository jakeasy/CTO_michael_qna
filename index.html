<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마이클 CTO × PM그룹 Q&A</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: 'Noto Sans KR', sans-serif;
    background: #0a0a0a;
    color: #fff;
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.12) 0%, transparent 40%),
      #0a0a0a;
  }

  header {
    padding: 40px 56px 32px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    gap: 40px;
  }
  .title {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: #fff;
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-wrap: wrap;
  }
  .title .cross {
    font-size: 36px;
    background: linear-gradient(135deg, #818cf8 0%, #ec4899 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
  }
  .title .qa {
    font-family: 'JetBrains Mono', monospace;
    font-size: 38px;
    font-weight: 700;
    background: linear-gradient(135deg, #818cf8 0%, #ec4899 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }
  .title-sub {
    font-size: 12px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 8px;
  }
  .title-wrap {
    display: flex;
    flex-direction: column;
    transition: opacity 0.5s ease;
  }
  .counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    padding-bottom: 8px;
    transition: opacity 0.5s ease;
  }
  .counter strong {
    color: #fff;
    font-size: 24px;
    font-weight: 700;
  }

  /* Welcome (pre-start) title */
  .welcome-title {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #ec4899 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-style: italic;
  }
  .welcome-sub {
    font-size: 12px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 10px;
  }

  /* State transitions */
  .fade-in {
    animation: fadeIn 0.6s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
  }

  .stage {
    width: 100%;
    max-width: 920px;
    text-align: center;
  }

  /* Start screen */
  .start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }
  .start-screen h1 {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1.15;
  }
  .start-screen h1 .accent {
    background: linear-gradient(135deg, #818cf8 0%, #ec4899 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .start-screen p {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    max-width: 560px;
    line-height: 1.7;
  }
  .start-actions {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Preview — all questions at once */
  .preview-wrap {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    animation: fadeIn 0.5s ease;
  }
  .preview-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .preview-heading {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .preview-heading .count {
    font-family: 'JetBrains Mono', monospace;
    color: #a5b4fc;
    margin-left: 10px;
    font-size: 18px;
  }
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .preview-card {
    background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 20px 22px;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .preview-card:hover {
    border-color: rgba(129, 140, 248, 0.35);
    background: linear-gradient(145deg, rgba(129, 140, 248, 0.05) 0%, rgba(236, 72, 153, 0.03) 100%);
    transform: translateY(-2px);
  }
  .preview-card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .preview-card-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .preview-card-num strong {
    color: #a5b4fc;
    font-size: 13px;
  }
  .preview-card .card-tag {
    margin-bottom: 0;
    padding: 3px 10px;
    font-size: 10px;
  }
  .preview-card-text {
    font-size: 14px;
    line-height: 1.55;
    color: rgba(255,255,255,0.9);
    font-weight: 400;
    word-break: keep-all;
  }
  .preview-back {
    margin-top: 36px;
    text-align: center;
  }

  /* Preview mode — enable scrolling */
  body.preview-open {
    overflow: auto;
  }
  body.preview-open main {
    align-items: flex-start;
    padding-top: 32px;
    padding-bottom: 48px;
  }

  @media (max-width: 860px) {
    .preview-grid { grid-template-columns: 1fr; }
  }

  /* Question card */
  .card {
    background: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 32px;
    padding: 56px 64px;
    backdrop-filter: blur(20px);
    animation: cardIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(129, 140, 248, 0.06) 0%, transparent 60%);
    pointer-events: none;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-label {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }
  .card-label .num {
    font-size: 14px;
    color: #818cf8;
    font-weight: 700;
  }
  .card-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .tag-personal   { background: rgba(251, 191, 36, 0.12); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.25); }
  .tag-life       { background: rgba(52, 211, 153, 0.12); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.25); }
  .tag-return     { background: rgba(244, 114, 182, 0.12); color: #f472b6; border: 1px solid rgba(244, 114, 182, 0.25); }
  .tag-direction  { background: rgba(129, 140, 248, 0.15); color: #a5b4fc; border: 1px solid rgba(129, 140, 248, 0.3); }
  .tag-product    { background: rgba(56, 189, 248, 0.12); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.25); }
  .tag-org        { background: rgba(248, 113, 113, 0.12); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.25); }

  .question-text {
    font-size: 32px;
    font-weight: 500;
    line-height: 1.55;
    letter-spacing: -0.01em;
    color: #fff;
    word-break: keep-all;
  }

  /* Number slot machine */
  .rolling .card-label .num {
    display: inline-block;
    animation: numFlicker 0.08s steps(1) infinite;
  }
  @keyframes numFlicker {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.6; }
  }
  .rolling .card-tag {
    animation: tagBlink 0.15s linear infinite;
  }
  @keyframes tagBlink {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 1; }
  }

  /* Skeleton loader bars (instead of real question text) */
  .skeleton-lines {
    display: flex;
    flex-direction: column;
    gap: 18px;
    padding: 8px 0;
  }
  .skeleton-line {
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(90deg,
      rgba(255,255,255,0.05) 0%,
      rgba(129, 140, 248, 0.18) 40%,
      rgba(236, 72, 153, 0.2) 50%,
      rgba(129, 140, 248, 0.18) 60%,
      rgba(255,255,255,0.05) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease-in-out infinite;
  }
  .skeleton-line:nth-child(1) { width: 85%; animation-delay: 0s; margin: 0 auto; }
  .skeleton-line:nth-child(2) { width: 95%; animation-delay: 0.15s; margin: 0 auto; }
  .skeleton-line:nth-child(3) { width: 70%; animation-delay: 0.3s; margin: 0 auto; }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Extracting status */
  .extracting-status {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #a5b4fc;
  }
  .extracting-status .dot-pulse {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ec4899;
    box-shadow: 0 0 12px #ec4899;
    animation: dotPulse 0.8s ease-in-out infinite;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50%      { opacity: 1;   transform: scale(1.2); }
  }
  .extracting-status .ellipsis::after {
    content: '';
    animation: ellipsis 1.2s steps(4, end) infinite;
  }
  @keyframes ellipsis {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }

  /* Scanning bar */
  .scan-bar {
    height: 2px;
    width: 100%;
    background: rgba(255,255,255,0.04);
    border-radius: 2px;
    margin-top: 40px;
    overflow: hidden;
    position: relative;
  }
  .scan-bar::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent, #818cf8, #ec4899, transparent);
    animation: scanMove 1.2s ease-in-out infinite;
  }
  @keyframes scanMove {
    0%   { transform: translateX(-120%); }
    100% { transform: translateX(320%); }
  }

  /* Final reveal flash */
  @keyframes revealFlash {
    0%   { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
    30%  { box-shadow: 0 0 80px 10px rgba(236, 72, 153, 0.35); }
    100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
  }
  .card.revealed {
    animation: cardIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), revealFlash 0.9s ease-out;
  }

  /* Controls */
  .controls {
    margin-top: 48px;
    display: flex;
    gap: 16px;
    justify-content: center;
    align-items: center;
  }
  button {
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    padding: 16px 36px;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
    color: #fff;
    box-shadow: 0 10px 40px rgba(99, 102, 241, 0.35);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 50px rgba(99, 102, 241, 0.5);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-ghost:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }
  .btn-start {
    font-size: 18px;
    padding: 20px 56px;
  }

  /* Finished screen */
  .finished {
    text-align: center;
  }
  .finished h2 {
    font-size: 48px;
    font-weight: 900;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fbbf24 0%, #ec4899 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .finished p {
    font-size: 18px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 40px;
  }

  footer {
    padding: 16px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .hotkey {
    padding: 3px 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    color: rgba(255,255,255,0.6);
  }

  /* Mini list indicator */
  .progress-dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    transition: all 0.3s ease;
  }
  .dot.done { background: rgba(255,255,255,0.5); }
  .dot.current {
    background: #ec4899;
    box-shadow: 0 0 12px rgba(236, 72, 153, 0.6);
    transform: scale(1.3);
  }

  @media (max-width: 768px) {
    header, footer { padding-left: 20px; padding-right: 20px; }
    header { padding-top: 24px; padding-bottom: 20px; }
    .card { padding: 32px 24px; border-radius: 24px; }
    .question-text { font-size: 22px; }
    .start-screen h1 { font-size: 36px; }
    .title { font-size: 26px; gap: 10px; }
    .title .cross { font-size: 22px; }
    .title .qa { font-size: 24px; }
    .title-sub { font-size: 10px; letter-spacing: 0.25em; }
    .welcome-title { font-size: 36px; }
  }
</style>
</head>
<body>

<header id="header">
  <div class="title-wrap" id="title-wrap">
    <div class="welcome-title">Welcome.</div>
    <div class="welcome-sub">A Special Gathering · April 2026</div>
  </div>
  <div class="counter" id="counter" style="opacity: 0; pointer-events: none;">
    <strong id="counter-done">0</strong> / <span id="counter-total">19</span>
  </div>
</header>

<main>
  <div class="stage" id="stage">
    <!-- Start screen -->
    <div class="start-screen" id="start-screen">
      <h1>CTO 마이클님의 귀환을<br><span class="accent">진심으로 환영합니다.</span></h1>
      <p>PM그룹원 19명이 익명으로 보낸 질문이 준비되어 있습니다.<br>아래 버튼을 눌러 시작해주세요.</p>
      <div class="start-actions">
        <button class="btn-primary btn-start" onclick="start()">시작하기 →</button>
        <button class="btn-ghost btn-start" onclick="openPreview()">전체 질문 보기</button>
      </div>
    </div>
  </div>
</main>

<footer>
  <div>© PM Group · 2026</div>
  <div>
    <span class="hotkey">Space</span> 다음 질문 &nbsp;
    <span class="hotkey">S</span> 스킵
  </div>
</footer>

<script>
const QUESTIONS = [
  { id: 1,  cat: 'personal',  tag: '마이클님 개인',  text: '마이클님은 어떤 사람인가요?' },
  { id: 2,  cat: 'life',      tag: '미국 생활',      text: '3년간의 미국 거주 후 느끼시는 장단점(추천/비추천)이 궁금합니다.' },
  { id: 3,  cat: 'return',    tag: '복귀 계획',      text: '향후 다시 본사에서 메디트를 이끌어 가실 계획이신지 궁금합니다.' },
  { id: 4,  cat: 'personal',  tag: '아이스브레이커', text: '진짜 익명인가요~~~~~~~?' },
  { id: 5,  cat: 'direction', tag: '방향성 · 시장',  text: '향후 메디트의 방향성에 대해 문의드리고 싶습니다. 구강스캐너 외 다른 제품에 대한 구상이나, 5년·10년 후 구강스캐너 트렌드를 어떻게 예상하시는지 여쭙고 싶습니다.' },
  { id: 6,  cat: 'life',      tag: '미국 생활',      text: '회의가 많이 있으신 걸로 아는데, 미국 시간으로 회의를 하시면 많이 늦은 시간이실 텐데 힘드시거나 하지는 않으신가요?' },
  { id: 7,  cat: 'product',   tag: '제품 전략',      text: '마이클님이 한국에 있을 때와 미국에 있을 때, 각 제품의 변화가 어떻게 느껴지시나요? 바른 길로 가고 있다고 보시나요?' },
  { id: 8,  cat: 'life',      tag: '미국 생활',      text: '미국 생활에 어려움은 없으신지요?' },
  { id: 9,  cat: 'life',      tag: '미국 생활',      text: '미국에서 재미있었던 에피소드는 없으신가요?' },
  { id: 10, cat: 'direction', tag: '방향성 · 시장',  text: 'MEDIT의 앞으로의 방향성과 구강 스캐너 시장의 미래를 CTO님께서는 어떻게 보고 계신지 궁금합니다.' },
  { id: 11, cat: 'direction', tag: '방향성 · 시장',  text: '최근 대내외적으로 시장이 어렵다는 이야기도 있는데, CTO님께서는 현재 메디트의 상황을 어떻게 보고 계신지 궁금합니다.' },
  { id: 12, cat: 'direction', tag: '방향성 · 시장',  text: '경쟁사의 동향 체크 및 메디트의 차세대 먹거리를 찾기 위해 마이클님은 어떤 노력을 하고 계시나요?' },
  { id: 13, cat: 'personal',  tag: '마이클님 개인',  text: '마이클님에 대해 궁금합니다. MBTI가 어떻게 되시는지요?' },
  { id: 14, cat: 'product',   tag: '제품 전략',      text: 'Express 플랫폼이 더 확장될 가능성이 있는지 궁금합니다.' },
  { id: 15, cat: 'product',   tag: '제품 전략',      text: '현재 Medit 플랫폼 내에는 다양한 프로덕트들이 있습니다. Medit Link, Express, M. 장기적으로 이 프로덕트들이 플랫폼 안에서 어떤 역할을 담당한다고 생각하시는지요?' },
  { id: 16, cat: 'return',    tag: '복귀 계획',      text: '앞으로 한국에 복귀해서 업무를 보실 예정은 없으신지요?' },
  { id: 17, cat: 'direction', tag: '방향성 · 시장',  text: '메디트가 앞으로 기술적으로 가장 먼저 선점해야 할 영역은 무엇이고, 그 우위를 사용성 차이로 만들기 위해 제품은 어떤 방향으로 가야 한다고 보시나요?' },
  { id: 18, cat: 'org',       tag: '조직 · 협업',    text: '미국에 MOS 관련 태스크 팀이 있다고 들었습니다. 해당 팀과 한국에서 MOS를 담당하는 팀 간에 커뮤니케이션 프로토콜을 구축할 수 있을까요? 갑작스럽게 수정하라는 요청을 좀 더 효율적이게 대응할 수 있도록 도움이 되지 않을까 싶습니다.' },
  { id: 19, cat: 'org',       tag: '조직 · 협업',    text: '일반적으로 회사의 로드맵에 맞춰 각 팀이 목표를 설정하고, 일정과 리소스를 고려해 프로젝트를 계획·추진하고 있는데, 분기 중간이나 출시 일정이 임박한 시점에 임원 주도로 특정 기능 추가나 변경이 비교적 짧은 일정 내에 요구되는 경우가 종종 발생하며, 이로 인해 기존 일정이나 품질에 영향을 받는 상황도 경험하고 있습니다. 이러한 방식이 조직 차원에서 불가피한 의사결정 과정의 일부라고 보시는지, 아니면 개선이 필요한 영역이라고 보시는지 마이클님의 의견이 궁금합니다. 만약 개선이 필요하다고 보신다면, 이러한 상황을 줄이거나 보다 효율적으로 관리할 수 있는 현실적인 방향에 대해서도 함께 듣고 싶습니다. 프로젝트 오너 입장에서는 일정과 품질 사이에서 균형을 맞추는 데 어려움이 있는 만큼, 이에 대한 조직적인 기준이나 원칙을 공유해주시면 큰 도움이 될 것 같습니다.' }
];

const stage = document.getElementById('stage');
const titleWrap = document.getElementById('title-wrap');
const counter = document.getElementById('counter');
const counterDone = document.getElementById('counter-done');
const counterTotal = document.getElementById('counter-total');
counterTotal.textContent = QUESTIONS.length;

let pool = [];
let doneIds = [];
let currentQuestion = null;
let rolling = false;
let started = false;
let previewMode = false;
let previewIndex = 0;

function revealMainTitle() {
  if (started) return;
  started = true;
  // Fade out welcome
  titleWrap.style.opacity = '0';
  setTimeout(() => {
    titleWrap.innerHTML = `
      <div class="title">
        <span>마이클 CTO</span>
        <span class="cross">×</span>
        <span>PM 그룹</span>
        <span class="qa">Q&amp;A</span>
      </div>
      <div class="title-sub">Welcome Back · April 2026</div>
    `;
    titleWrap.classList.add('fade-in');
    titleWrap.style.opacity = '1';
    counter.style.opacity = '1';
  }, 400);
}

function start() {
  pool = [...QUESTIONS];
  doneIds = [];
  counterDone.textContent = 0;
  previewMode = false;
  revealMainTitle();
  pickNext();
}

function openPreview() {
  previewMode = true;
  document.body.classList.add('preview-open');
  renderPreview();
}

function renderPreview() {
  const cardsHTML = QUESTIONS.map(q => `
    <div class="preview-card">
      <div class="preview-card-head">
        <div class="preview-card-num">Q <strong>#${String(q.id).padStart(2, '0')}</strong></div>
        <div class="card-tag tag-${q.cat}">${q.tag}</div>
      </div>
      <div class="preview-card-text">${q.text}</div>
    </div>
  `).join('');

  stage.innerHTML = `
    <div class="preview-wrap">
      <div class="preview-header">
        <div class="preview-heading">전체 질문<span class="count">${QUESTIONS.length}개</span></div>
        <button class="btn-ghost" onclick="backToWelcome()">← 처음 화면으로</button>
      </div>
      <div class="preview-grid">${cardsHTML}</div>
      <div class="preview-back">
        <button class="btn-ghost" onclick="backToWelcome()">← 처음 화면으로</button>
      </div>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function backToWelcome() {
  previewMode = false;
  document.body.classList.remove('preview-open');
  stage.innerHTML = `
    <div class="start-screen" id="start-screen">
      <h1>CTO 마이클님의 귀환을<br><span class="accent">진심으로 환영합니다.</span></h1>
      <p>PM그룹원 19명이 익명으로 보낸 질문이 준비되어 있습니다.<br>아래 버튼을 눌러 시작해주세요.</p>
      <div class="start-actions">
        <button class="btn-primary btn-start" onclick="start()">시작하기 →</button>
        <button class="btn-ghost btn-start" onclick="openPreview()">전체 질문 보기</button>
      </div>
    </div>
  `;
}

function pickNext() {
  if (pool.length === 0) {
    renderFinished();
    return;
  }
  rolling = true;

  // Ease-out schedule: starts fast, slows down gradually, then stops
  // Total duration ~2.8s, about 28 frame changes
  const schedule = [
    60, 60, 60, 70, 70, 80, 80, 90, 100, 110,
    120, 135, 150, 170, 190, 210, 230, 260, 290, 320,
    360, 400, 440, 490
  ];

  renderQuestion(QUESTIONS[Math.floor(Math.random() * QUESTIONS.length)], true);

  let step = 0;
  function tick() {
    if (step >= schedule.length) {
      // Final pick with brief pause before reveal
      const idx = Math.floor(Math.random() * pool.length);
      const picked = pool.splice(idx, 1)[0];
      currentQuestion = picked;
      rolling = false;
      renderQuestion(picked, false, true);
      return;
    }
    const q = pool[Math.floor(Math.random() * pool.length)];
    renderQuestion(q, true);
    setTimeout(tick, schedule[step]);
    step++;
  }
  tick();
}

function next() {
  if (rolling) return;
  if (currentQuestion) {
    doneIds.push(currentQuestion.id);
    counterDone.textContent = doneIds.length;
  }
  pickNext();
}

function skip() {
  if (rolling || !currentQuestion) return;
  // Put it back in the pool
  pool.push(currentQuestion);
  currentQuestion = null;
  pickNext();
}

function renderQuestion(q, isRolling, isReveal) {
  const dotsHTML = QUESTIONS.map(item => {
    let cls = 'dot';
    if (doneIds.includes(item.id)) cls += ' done';
    if (!isRolling && currentQuestion && item.id === currentQuestion.id) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');

  const statusHTML = isRolling
    ? `<div class="extracting-status">
         <div class="dot-pulse"></div>
         <span>다음 질문 추출 중<span class="ellipsis"></span></span>
       </div>`
    : '';

  const scanHTML = isRolling ? '<div class="scan-bar"></div>' : '';

  const cardClasses = [
    'card',
    isRolling ? 'rolling' : '',
    isReveal ? 'revealed' : ''
  ].filter(Boolean).join(' ');

  // During rolling: show skeleton bars instead of real text
  const bodyHTML = isRolling
    ? `<div class="skeleton-lines">
         <div class="skeleton-line"></div>
         <div class="skeleton-line"></div>
         <div class="skeleton-line"></div>
       </div>`
    : `<div class="question-text">${q.text}</div>`;

  // During rolling: show ??? instead of real number
  const numberText = isRolling
    ? `#${String(Math.floor(Math.random() * 19) + 1).padStart(2, '0')}`
    : `#${String(q.id).padStart(2, '0')}`;

  stage.innerHTML = `
    ${statusHTML}
    <div class="${cardClasses}">
      <div class="card-label">
        QUESTION <span class="num">${numberText}</span>
      </div>
      <div class="card-tag tag-${q.cat}">${q.tag}</div>
      ${bodyHTML}
      ${scanHTML}
    </div>
    <div class="controls">
      <button class="btn-ghost" onclick="skip()" ${isRolling ? 'disabled' : ''}>스킵</button>
      <button class="btn-primary" onclick="next()" ${isRolling ? 'disabled' : ''}>
        ${pool.length === 0 ? '마지막 질문 완료' : '다음 질문 →'}
      </button>
    </div>
    <div class="progress-dots">${dotsHTML}</div>
  `;
}

function renderFinished() {
  stage.innerHTML = `
    <div class="finished">
      <h2>모든 질문을 마쳤습니다 🎉</h2>
      <p>마이클님, 귀한 시간 내주셔서 감사합니다.<br>PM그룹원들에게 한 말씀 부탁드립니다.</p>
      <button class="btn-primary btn-start" onclick="start()">다시 시작</button>
    </div>
  `;
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (previewMode) {
    if (e.key === 'Escape') backToWelcome();
    return;
  }
  if (e.code === 'Space') { e.preventDefault(); if (!rolling && currentQuestion) next(); else if (pool.length === 0 && !currentQuestion) start(); }
  if (e.key.toLowerCase() === 's' && !rolling && currentQuestion) skip();
});
</script>
